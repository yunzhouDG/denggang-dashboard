<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>测试内嵌地图</title>
<script src="https://unpkg.com/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
<div id="map" style="width:800px;height:600px;border:1px solid #ccc;margin:20px"></div>
<div id="status" style="margin:20px;font-family:monospace;font-size:12px"></div>
<script>
var status = document.getElementById('status');
status.textContent = 'ECharts: ' + typeof echarts;

// 简化的中国地图 GeoJSON（只包含几个主要省份作为测试）
var chinaGeoJSON = {
  "type": "FeatureCollection",
  "features": [
    {"type":"Feature","properties":{"name":"北京"},"geometry":{"type":"Polygon","coordinates":[[[116.2,39.8],[116.5,39.8],[116.5,40.0],[116.2,40.0],[116.2,39.8]]]}},
    {"type":"Feature","properties":{"name":"上海"},"geometry":{"type":"Polygon","coordinates":[[[121.4,31.1],[121.6,31.1],[121.6,31.3],[121.4,31.3],[121.4,31.1]]]}},
    {"type":"Feature","properties":{"name":"广东"},"geometry":{"type":"Polygon","coordinates":[[[113.2,22.8],[114.5,22.8],[114.5,24.5],[113.2,24.5],[113.2,22.8]]]}}
  ]
};

status.textContent += '\nGeoJSON features: ' + chinaGeoJSON.features.length;
echarts.registerMap('china', chinaGeoJSON);
status.textContent += '\nMap registered';

var chart = echarts.init(document.getElementById('map'));
chart.setOption({
  tooltip: { trigger: 'item' },
  series: [{
    type: 'map',
    map: 'china',
    roam: true,
    itemStyle: { areaColor: '#cfe2f3', borderColor: '#999' },
    label: { show: true, fontSize: 12 },
    data: [
      { name: '北京', value: 100 },
      { name: '广东', value: 200 },
      { name: '上海', value: 150 }
    ]
  }]
});
status.textContent += '\nChart rendered!';
</script>
</body>
</html>
