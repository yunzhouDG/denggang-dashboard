<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天猫新零售数据看板</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
  :root {
    --bg: #0a0e1a;
    --card-bg: #111827;
    --card-border: #1e293b;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --accent: #3b82f6;
    --accent2: #06b6d4;
    --green: #10b981;
    --amber: #f59e0b;
    --red: #ef4444;
    --purple: #8b5cf6;
    --pink: #ec4899;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  .header {
    text-align: center;
    padding: 24px 20px 12px;
    background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
    border-bottom: 1px solid var(--card-border);
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(90deg, #60a5fa, #a78bfa, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
  }
  .header .subtitle {
    color: var(--text-dim);
    font-size: 13px;
    margin-top: 4px;
  }
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    gap: 12px;
    padding: 20px 24px 8px;
  }
  .kpi-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 16px 14px;
    text-align: center;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .kpi-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(59,130,246,0.15);
  }
  .kpi-card .label {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 8px;
    white-space: nowrap;
  }
  .kpi-card .value {
    font-size: 26px;
    font-weight: 700;
    line-height: 1.2;
  }
  .kpi-card .value.blue { color: #60a5fa; }
  .kpi-card .value.cyan { color: #22d3ee; }
  .kpi-card .value.green { color: #34d399; }
  .kpi-card .value.amber { color: #fbbf24; }
  .kpi-card .value.purple { color: #a78bfa; }
  .kpi-card .value.pink { color: #f472b6; }
  .kpi-card .value.red { color: #f87171; }
  .kpi-card .unit {
    font-size: 13px;
    font-weight: 400;
    margin-left: 2px;
  }
  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
    padding: 14px 24px;
  }
  .chart-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 16px;
  }
  .chart-card.full { grid-column: span 3; }
  .chart-card.span2 { grid-column: span 2; }
  .chart-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 12px;
    padding-left: 10px;
    border-left: 3px solid var(--accent);
  }
  .chart-box { width: 100%; height: 320px; }
  .chart-box.small { height: 280px; }
  .summary-section {
    padding: 0 24px 20px;
  }
  .summary-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--card-bg);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--card-border);
  }
  .summary-table th {
    background: #1e293b;
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 600;
    padding: 10px 14px;
    text-align: left;
    white-space: nowrap;
  }
  .summary-table td {
    padding: 9px 14px;
    font-size: 13px;
    border-top: 1px solid var(--card-border);
    color: var(--text);
  }
  .summary-table tr:hover td { background: rgba(59,130,246,0.05); }
  .tag {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
  }
  .tag-brand { background: rgba(59,130,246,0.15); color: #60a5fa; }
  .tag-cat { background: rgba(6,182,212,0.15); color: #22d3ee; }
  .tag-center { background: rgba(139,92,246,0.15); color: #a78bfa; }
  .tag-area { background: rgba(236,72,153,0.15); color: #f472b6; }
  .deal-rate-high { color: var(--red) !important; font-weight: 700; }

  /* Filter bar */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 24px;
    background: var(--card-bg);
    border-bottom: 1px solid var(--card-border);
    flex-wrap: wrap;
  }
  .filter-bar label {
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 600;
  }
  .filter-bar select,
  .filter-bar input[type="date"] {
    background: #0f172a;
    color: var(--text);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 13px;
    outline: none;
    font-family: inherit;
  }
  .filter-bar select:focus,
  .filter-bar input[type="date"]:focus {
    border-color: var(--accent);
  }
  .filter-bar select { min-width: 140px; }
  .filter-bar .date-group {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .filter-bar .btn-reset {
    background: rgba(239,68,68,0.15);
    color: #f87171;
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
  }
  .filter-bar .btn-reset:hover {
    background: rgba(239,68,68,0.25);
  }

  @media (max-width: 1200px) {
    .kpi-row { grid-template-columns: repeat(3, 1fr); }
    .charts-grid { grid-template-columns: 1fr; }
    .chart-card.full, .chart-card.span2 { grid-column: span 1; }
  }
  @media (max-width: 768px) {
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
    .header h1 { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>📊 天猫新零售数据看板</h1>
  <div class="subtitle">数据驱动决策 · 实时业务洞察</div>
</div>

<div class="filter-bar" id="filterBar">
  <label>📅 日期</label>
  <div class="date-group">
    <input type="date" id="filterDateStart">
    <span style="color:#64748b">~</span>
    <input type="date" id="filterDateEnd">
  </div>
  <label>🏷️ 品牌</label>
  <select id="filterBrand"><option value="">全部</option></select>
  <label>📦 品类</label>
  <select id="filterCategory"><option value="">全部</option></select>
  <label>🏢 运中</label>
  <select id="filterCenter"><option value="">全部</option></select>
  <button class="btn-reset" onclick="resetFilters()">重置</button>
</div>

<div class="kpi-row" id="kpiRow"></div>

<div class="charts-grid">
  <div class="chart-card full">
    <div class="chart-title">📊 每日趋势（客资数 vs 订单数）</div>
    <div class="chart-box" id="dailyTrendChart" style="height:320px"></div>
  </div>
  <div class="chart-card span2">
    <div class="chart-title">📈 日度四率走势（有效客资率/分配率/跟进率/成交率）</div>
    <div class="chart-box" id="trendChart"></div>
  </div>
  <div class="chart-card">
    <div class="chart-title">🔻 转化漏斗</div>
    <div class="chart-box" id="funnelChart"></div>
  </div>
  <div class="chart-card full">
    <div class="chart-title">💰 月度品类金额（万元）</div>
    <div class="chart-box" id="monthlyCatChart" style="height:320px"></div>
  </div>
  <div class="chart-card">
    <div class="chart-title">🏷️ 品牌分析</div>
    <div class="chart-box small" id="brandChart"></div>
  </div>
  <div class="chart-card">
    <div class="chart-title">📦 品类分析</div>
    <div class="chart-box small" id="categoryChart"></div>
  </div>
  <div class="chart-card">
    <div class="chart-title">🏢 运营中心TOP15</div>
    <div class="chart-box small" id="centerChart"></div>
  </div>
</div>

<div class="charts-row" style="margin-top:16px">
  <div class="chart-card">
    <div class="chart-title">🗺️ 客资省份分布</div>
    <div class="chart-box small" id="kzProvinceChart" style="height:420px"></div>
  </div>
  <div class="chart-card">
    <div class="chart-title">🗺️ 订单省份金额（万元）</div>
    <div class="chart-box small" id="orderProvinceChart" style="height:420px"></div>
  </div>
  <div class="chart-card">
    <div class="chart-title">📍 运营中心订单分布（气泡图）</div>
    <div class="chart-box small" id="centerProvinceChart" style="height:420px"></div>
  </div>
</div>

<div class="summary-section">
  <div class="chart-card" style="margin-bottom:20px">
    <div class="chart-title">📋 汇总明细</div>
    <div style="overflow-x:auto;max-height:500px;overflow-y:auto" id="summaryContainer"></div>
  </div>
</div>

<script>
// ===== Load Data =====
let DATA, filteredKPI, filteredDetail, filteredOrders, filteredDaily;
let filteredBrands, filteredCategories, filteredCenters, filteredAreas;
let chartDailyTrend, chartRateTrend, chartFunnel, chartBrand, chartCategory, chartCenter, chartMonthlyCat;
let chartKzProvince, chartOrderProvince, chartCenterProvince;

fetch('dashboard_data.json?t=' + Date.now())
  .then(r => r.json())
  .then(data => {
    DATA = data;
    initFilters();
    applyFilters();
  });

// ===== Filter Logic =====
function initFilters() {
  const opts = DATA.filterOptions;
  document.getElementById('filterDateStart').value = opts.dateMin;
  document.getElementById('filterDateEnd').value = opts.dateMax;
  const bSel = document.getElementById('filterBrand');
  opts.brands.forEach(b => { const o = document.createElement('option'); o.value = b; o.textContent = b; bSel.appendChild(o); });
  const cSel = document.getElementById('filterCategory');
  opts.categories.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; cSel.appendChild(o); });
  const oSel = document.getElementById('filterCenter');
  opts.centers.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; oSel.appendChild(o); });
}

function resetFilters() {
  const opts = DATA.filterOptions;
  document.getElementById('filterDateStart').value = opts.dateMin;
  document.getElementById('filterDateEnd').value = opts.dateMax;
  document.getElementById('filterBrand').value = '';
  document.getElementById('filterCategory').value = '';
  document.getElementById('filterCenter').value = '';
  applyFilters();
}

function applyFilters() {
  const ds = document.getElementById('filterDateStart').value;
  const de = document.getElementById('filterDateEnd').value;
  const brand = document.getElementById('filterBrand').value;
  const cat = document.getElementById('filterCategory').value;
  const center = document.getElementById('filterCenter').value;

  // Filter aggregated detail
  const fDetail = DATA.aggDetail.filter(r => {
    if (ds && r['日期'] < ds) return false;
    if (de && r['日期'] > de) return false;
    if (brand && r['意向品牌'] !== brand) return false;
    if (cat && r['品类'] !== cat) return false;
    if (center && r['运营中心'] !== center) return false;
    return true;
  });

  // Filter aggregated orders
  const fOrders = DATA.aggOrders.filter(r => {
    if (ds && r['日期'] < ds) return false;
    if (de && r['日期'] > de) return false;
    if (brand && r['品牌'] !== brand) return false;
    if (cat && r['品类'] !== cat) return false;
    if (center && r['运中'] !== center) return false;
    return true;
  });

  // KPI sums
  let totalKz=0, validKz=0, assigned=0, followed=0, orders=0, amount=0;
  fDetail.forEach(r => { totalKz += r['总客资']; validKz += r['有效客资']; assigned += r['分配数']; followed += r['跟进数']; });
  fOrders.forEach(r => { orders += r['订单数']; amount += r['订单金额']; });
  filteredKPI = {
    totalKz, validKz, assigned, followed, orders,
    amountWan: Math.round(amount / 10000 * 10) / 10,
    assignRate: validKz ? Math.round(assigned / validKz * 1000) / 10 : 0,
    followRate: assigned ? Math.round(followed / assigned * 1000) / 10 : 0,
    dealRate: validKz ? Math.round(orders / validKz * 1000) / 10 : 0
  };

  // Daily trend from filtered detail
  const dateMap = {};
  fDetail.forEach(r => {
    const d = r['日期']; if (!dateMap[d]) dateMap[d] = { 客资数:0, 有效客资:0, 分配数:0, 跟进数:0, 成交数:0 };
    dateMap[d].客资数 += r['总客资'];
    dateMap[d].有效客资 += r['有效客资'];
    dateMap[d].分配数 += r['分配数'];
    dateMap[d].跟进数 += r['跟进数'];
  });
  fOrders.forEach(r => {
    const d = r['日期']; if (!dateMap[d]) dateMap[d] = { 客资数:0, 有效客资:0, 分配数:0, 跟进数:0, 成交数:0 };
    dateMap[d].成交数 += r['订单数'];
  });
  filteredDaily = Object.keys(dateMap).sort().map(d => {
    const v = dateMap[d];
    return { 日期_str: d, 客资数: v.客资数, 有效客资: v.有效客资, 分配数: v.分配数, 跟进数: v.跟进数, 成交数: v.成交数,
      有效客资率: v.客资数 ? Math.round(v.有效客资/v.客资数*1000)/10 : 0,
      分配率: v.有效客资 ? Math.round(v.分配数/v.有效客资*1000)/10 : 0,
      跟进率: v.分配数 ? Math.round(v.跟进数/v.分配数*1000)/10 : 0,
      成交率: v.有效客资 ? Math.round(v.成交数/v.有效客资*1000)/10 : 0 };
  });

  // Breakdowns
  function calcBreakdown(detailKey, orderKey) {
    const dMap={}, oMap={};
    fDetail.forEach(r => { const k=r[detailKey]; if(!k) return; dMap[k]=(dMap[k]||{客资数:0}); dMap[k].客资数+=r['总客资']; });
    fOrders.forEach(r => { const k=r[orderKey]; if(!k) return; oMap[k]=oMap[k]||{订单数:0,订单金额:0}; oMap[k].订单数+=r['订单数']; oMap[k].订单金额+=r['订单金额']; });
    const keys = new Set([...Object.keys(dMap),...Object.keys(oMap)]);
    return [...keys].map(k => ({ [detailKey]:k, 客资数:(dMap[k]||{}).客资数||0, 订单数:(oMap[k]||{}).订单数||0, 订单金额:(oMap[k]||{}).订单金额||0, 订单金额_万:Math.round(((oMap[k]||{}).订单金额||0)/10000*10)/10 }));
  }
  filteredBrands = calcBreakdown('意向品牌','品牌');
  filteredCategories = calcBreakdown('品类','品类');
  filteredCenters = calcBreakdown('运营中心','运中');

  // Areas
  const centerAreaMap = {};
  DATA.aggDetail.forEach(r => { if(r['运营中心']) centerAreaMap[r['运营中心']] = ''; });
  // Use static area mapping from pre-built data
  const areaMap2 = {};
  DATA.areas.forEach(r => { areaMap2[r['片区']] = true; });
  // Simpler: just use centers as areas proxy
  filteredAreas = filteredCenters.map(r => ({ 片区: r['运营中心'], ...r }));

  renderKPI(); renderDailyTrend(); renderRateTrend(); renderFunnel();
  renderBrandChart(); renderCategoryChart(); renderCenterChart(); renderMonthlyCatChart(); renderProvinceCharts(); renderSummary();
}

// Bind filter events
['filterDateStart','filterDateEnd','filterBrand','filterCategory','filterCenter'].forEach(id => {
  document.getElementById(id).addEventListener('change', applyFilters);
});

// ===== KPI Cards =====
const kpiConfig = [
  { key: 'totalKz', label: '总客资', cls: 'blue', format: v => v.toLocaleString() },
  { key: 'validKz', label: '有效客资', cls: 'cyan', format: v => v.toLocaleString() },
  { key: 'assigned', label: '分配数', cls: 'green', format: v => v.toLocaleString() },
  { key: 'followed', label: '跟进数', cls: 'green', format: v => v.toLocaleString() },
  { key: 'orders', label: '成交数', cls: 'purple', format: v => v.toLocaleString() },
  { key: 'amountWan', label: '订单金额', cls: 'pink', format: v => v + '<span class="unit">万</span>' },
  { key: 'assignRate', label: '分配率', cls: 'amber', format: v => v + '<span class="unit">%</span>' },
  { key: 'followRate', label: '跟进率', cls: 'amber', format: v => v + '<span class="unit">%</span>' },
  { key: 'dealRate', label: '成交率', cls: v => v > 80 ? 'red' : 'amber', format: v => v + '<span class="unit">%</span>' },
];

function renderKPI() {
  const kpiRow = document.getElementById('kpiRow');
  kpiRow.innerHTML = '';
  kpiConfig.forEach(item => {
    const val = filteredKPI[item.key];
    const cls = typeof item.cls === 'function' ? item.cls(val) : item.cls;
    kpiRow.innerHTML += `
      <div class="kpi-card">
        <div class="label">${item.label}</div>
        <div class="value ${cls}">${item.format(val)}</div>
      </div>`;
  });
}

// ===== ECharts common =====
const colors = ['#60a5fa','#34d399','#fbbf24','#a78bfa','#f472b6','#22d3ee','#fb923c','#4ade80'];
function initChart(id) { return echarts.init(document.getElementById(id)); }

// ===== Funnel =====
function renderFunnel() {
  if (!chartFunnel) chartFunnel = initChart('funnelChart');
  const d = [
    { name: '总客资', value: filteredKPI.totalKz },
    { name: '有效客资', value: filteredKPI.validKz },
    { name: '分配数', value: filteredKPI.assigned },
    { name: '跟进数', value: filteredKPI.followed },
    { name: '成交数', value: filteredKPI.orders }
  ];
  const funnelData = d.map((v, i) => ({ name: v.name, value: v.value, itemStyle: { color: colors[i] } }));
  chartFunnel.setOption({
    tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
    series: [{ type: 'funnel', left: '10%', right: '10%', top: 10, bottom: 10, width: '80%', sort: 'descending', gap: 4, label: { show: true, position: 'inside', color: '#fff', fontSize: 13, fontWeight: 600 }, labelLine: { show: false }, itemStyle: { borderColor: 'var(--bg)', borderWidth: 2 }, emphasis: { label: { fontSize: 15 } }, data: funnelData }]
  });
}

// ===== Rate Trend =====
function renderDailyTrend() {
  if (!chartDailyTrend) chartDailyTrend = initChart('dailyTrendChart');
  const d = filteredDaily;
  const dates = d.map(x => x['日期_str'].slice(5));
  chartDailyTrend.setOption({
    tooltip: {
      trigger: 'axis',
      axisPointer: { type: 'cross' },
      formatter: function(params) {
        let s = '<div style="font-weight:600;margin-bottom:4px">' + d[params[0].dataIndex]['日期_str'] + '</div>';
        params.forEach(p => {
          s += '<div style="display:flex;align-items:center;gap:6px">'
            + p.marker + p.seriesName + ': <b>' + p.value.toLocaleString() + '</b></div>';
        });
        return s;
      }
    },
    legend: { data: ['客资数','订单数'], top: 0, textStyle: { color: '#94a3b8', fontSize: 12 } },
    grid: { left: 60, right: 60, top: 40, bottom: 30 },
    xAxis: { type: 'category', data: dates, axisLabel: { color: '#94a3b8', fontSize: 10 }, axisLine: { lineStyle: { color: '#334155' } }, axisTick: { show: false } },
    yAxis: [
      { type: 'value', name: '客资数', position: 'left', nameTextStyle: { color: '#60a5fa', fontSize: 11 }, axisLabel: { color: '#60a5fa' }, splitLine: { lineStyle: { color: '#1e293b' } } },
      { type: 'value', name: '订单数', position: 'right', nameTextStyle: { color: '#f472b6', fontSize: 11 }, axisLabel: { color: '#f472b6' }, splitLine: { show: false } }
    ],
    series: [
      { name: '客资数', type: 'line', smooth: true, symbol: 'none', data: d.map(x => x['客资数']), yAxisIndex: 0, lineStyle: { color: '#60a5fa', width: 2 }, itemStyle: { color: '#60a5fa' }, areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: 'rgba(96,165,250,0.35)' }, { offset: 1, color: 'rgba(96,165,250,0.02)' }]) }, emphasis: { focus: 'series' } },
      { name: '订单数', type: 'line', smooth: true, symbol: 'none', data: d.map(x => x['成交数']), yAxisIndex: 1, lineStyle: { color: '#f472b6', width: 2 }, itemStyle: { color: '#f472b6' }, areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: 'rgba(244,114,182,0.4)' }, { offset: 1, color: 'rgba(244,114,182,0.03)' }]) }, emphasis: { focus: 'series' } }
    ]
  });
}
// ===== Rate Trend =====
function renderRateTrend() {
  if (!chartRateTrend) chartRateTrend = initChart('trendChart');
  const d = filteredDaily;
  const dates = d.map(x => x['日期_str'].slice(5));
  chartRateTrend.setOption({
    tooltip: { trigger: 'axis', formatter: function(params) { let s = '<div style="font-weight:600;margin-bottom:4px">' + d[params[0].dataIndex]['日期_str'] + '</div>'; params.forEach(p => { s += '<div style="display:flex;align-items:center;gap:6px">' + p.marker + p.seriesName + ': <b>' + p.value + '%</b></div>'; }); return s; } },
    legend: { data: ['有效客资率','分配率','跟进率','成交率'], top: 0, textStyle: { color: '#94a3b8', fontSize: 11 } },
    grid: { left: 50, right: 30, top: 40, bottom: 50 },

  '河北':'河北省','山西':'山西省','辽宁':'辽宁省','吉林':'吉林省','黑龙江':'黑龙江省',

  '山东':'山东省','河南':'河南省','湖北':'湖北省','湖南':'湖南省','广东':'广东省',
  '海南':'海南省','四川':'四川省','贵州':'贵州省','云南':'云南省','陕西':'陕西省',

  '内蒙古':'内蒙古自治区','广西':'广西壮族自治区','西藏':'西藏自治区','宁夏':'宁夏回族自治区',
  '新疆':'新疆维吾尔自治区','香港':'香港特别行政区','澳门':'澳门特别行政区',
  '南海诸岛':'南海诸岛'
};

function loadChinaMap(cb) {
  if (echarts.getMap('china')) return cb();
  fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json')
    .then(r => r.json())
    .then(geo => {
      echarts.registerMap('china', geo);
      cb();
    })
    .catch(() => cb());
}

function mapProvinceData(data) {
  return (data || []).map(function(item) {
    var fullName = PROVINCE_NAME_MAP[item.name] || item.name;
    return { name: fullName, value: item.value };
  });
}

function renderProvinceCharts() {
  loadChinaMap(function() {
    var kzData = mapProvinceData(DATA.kzProvince);
    var odData = mapProvinceData(DATA.orderProvince);
    var ctData = mapProvinceData(DATA.centerProvince);

    // 客资省份
    if (!chartKzProvince) chartKzProvince = initChart('kzProvinceChart');
    var kzMax = Math.max(...kzData.map(function(x){return x.value}),1);
    chartKzProvince.setOption({
      tooltip: { trigger: 'item', formatter: function(p){ return p.name + '<br/>客资数: ' + (p.value || 0); } },
      visualMap: { min: 0, max: kzMax, left: 20, bottom: 20, text: ['高','低'], textStyle: { color: '#cbd5e1', fontSize: 11 }, inRange: { color: ['#e0f2fe','#38bdf8','#0284c7','#075985','#0c4a6e'] }, calculable: true },
      series: [{ type: 'map', map: 'china', roam: true, label: { show: true, color: '#1e293b', fontSize: 9 }, emphasis: { label: { color: '#fff', fontSize: 12, fontWeight: 'bold' }, itemStyle: { areaColor: '#f59e0b' } }, data: kzData, itemStyle: { borderColor: '#475569', borderWidth: 0.8 } }]
    });

    // 订单省份金额
    if (!chartOrderProvince) chartOrderProvince = initChart('orderProvinceChart');
    var odMax = Math.max(...odData.map(function(x){return x.value}),1);
    chartOrderProvince.setOption({
      tooltip: { trigger: 'item', formatter: function(p){ return p.name + '<br/>金额: ' + (p.value || 0) + '万'; } },
      visualMap: { min: 0, max: odMax, left: 20, bottom: 20, text: ['高','低'], textStyle: { color: '#cbd5e1', fontSize: 11 }, inRange: { color: ['#fee2e2','#f87171','#dc2626','#991b1b','#7f1d1d'] }, calculable: true },
      series: [{ type: 'map', map: 'china', roam: true, label: { show: true, color: '#1e293b', fontSize: 9 }, emphasis: { label: { color: '#fff', fontSize: 12, fontWeight: 'bold' }, itemStyle: { areaColor: '#f59e0b' } }, data: odData, itemStyle: { borderColor: '#475569', borderWidth: 0.8 } }]
    });

    // 运营中心气泡图（不需要 loadChinaMap）
    if (!chartCenterProvince) chartCenterProvince = initChart('centerProvinceChart');
    // 不需要地图模式，重新初始化为普通图表
    chartCenterProvince.clear();
    var centerData = DATA.centers || [];
    var centerMax = Math.max(...centerData.map(function(x){ return (x['订单金额_万']||0); }), 1);
    var centerMinSize = 15;
    var centerMaxSize = 60;
    chartCenterProvince.setOption({
      tooltip: {
        trigger: 'item',
        formatter: function(p) {
          return p.name + '<br/>订单数: ' + (p.data['订单数']||0) + '<br/>订单金额: ' + (p.data['订单金额_万']||0) + '万';
        }
      },
      grid: { left: 60, right: 40, top: 30, bottom: 60 },
      xAxis: { type: 'value', show: false },
      yAxis: { type: 'value', show: false },
      series: [{
        type: 'scatter',
        symbolSize: function(data) {
          return centerMinSize + (data['订单金额_万'] / centerMax) * (centerMaxSize - centerMinSize);
        },
        data: centerData.map(function(c) {
          return {
            name: c['运营中心'] || c['name'],
            value: [
              Math.random() * 80 + 10,
              Math.random() * 80 + 10,
              c['订单金额_万'] || 0
            ],
            '订单数': c['订单数'] || 0,
            '订单金额_万': c['订单金额_万'] || 0
          };
        }),
        itemStyle: {
          color: new echarts.graphic.RadialGradient(0.4, 0.3, 1, [
            { offset: 0, color: 'rgba(56,189,248,0.9)' },
            { offset: 1, color: 'rgba(2,132,199,0.4)' }
          ]),
          shadowBlur: 10,
          shadowColor: 'rgba(56,189,248,0.5)'
        },
        label: {
          show: true,
          formatter: function(p){ return p.name; },
          position: 'bottom',
          color: '#e2e8f0',
          fontSize: 11,
          fontWeight: 'bold'
        },
        emphasis: {
          itemStyle: {
            shadowBlur: 20,
            shadowColor: 'rgba(56,189,248,0.8)',
            color: new echarts.graphic.RadialGradient(0.4, 0.3, 1, [
              { offset: 0, color: 'rgba(251,191,36,0.95)' },
              { offset: 1, color: 'rgba(245,158,11,0.5)' }
            ])
          }
        }
      }]
    });
  });
}

// ===== Summary Table =====
function renderSummary() {
  const container = document.getElementById('summaryContainer');
  function buildSection(title, data, tagCls, nameCol) {
    const rows = data.sort((a, b) => b['订单金额'] - a['订单金额']).map(r => {
      const rate = r['客资数'] > 0 ? (r['订单数'] / r['客资数'] * 100).toFixed(1) : '0.0';
      const rateCls = parseFloat(rate) > 80 ? 'deal-rate-high' : '';
      return `<tr>
        <td>${r[nameCol]}</td>
        <td>${Number(r['客资数']).toLocaleString()}</td>
        <td>${Number(r['订单数']).toLocaleString()}</td>
        <td>${r['订单金额_万']}万</td>
        <td class="${rateCls}">${rate}%</td>
      </tr>`;
    }).join('');
    return `
      <table class="summary-table" style="margin-bottom:16px">
        <thead><tr>
          <th>${title}</th>
          <th>客资数</th><th>订单数</th><th>金额</th><th>成交率</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }
  container.innerHTML =
    buildSection('品牌', filteredBrands, 'tag-brand', '意向品牌') +
    buildSection('品类', filteredCategories, 'tag-cat', '品类') +
    buildSection('运营中心', filteredCenters, 'tag-center', '运营中心') +
    buildSection('片区', filteredAreas, 'tag-area', '片区');
}
