<style>
  :root {
    --bg: #0a0e1a;
    --card-bg: #111827;
    --card-border: #1e293b;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --accent: #3b82f6;
    --accent2: #06b6d4;
    --green: #10b981;
    --amber: #f59e0b;
    --red: #ef4444;
    --purple: #8b5cf6;
    --pink: #ec4899;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  .header {
    text-align: center;
    padding: 24px 20px 12px;
    background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
    border-bottom: 1px solid var(--card-border);
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(90deg, #60a5fa, #a78bfa, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
  }
  .header .subtitle {
    color: var(--text-dim);
    font-size: 13px;
    margin-top: 4px;
  }
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    gap: 12px;
    padding: 20px 24px 8px;
  }
  .kpi-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 16px 14px;
    text-align: center;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .kpi-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(59,130,246,0.15);
  }
  .kpi-card .label {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 8px;
    white-space: nowrap;
  }
  .kpi-card .value {
    font-size: 26px;
    font-weight: 700;
    line-height: 1.2;
  }
  .kpi-card .value.blue { color: #60a5fa; }
  .kpi-card .value.cyan { color: #22d3ee; }
  .kpi-card .value.green { color: #34d399; }
  .kpi-card .value.amber { color: #fbbf24; }
  .kpi-card .value.purple { color: #a78bfa; }
  .kpi-card .value.pink { color: #f472b6; }
  .kpi-card .value.red { color: #f87171; }
  .kpi-card .unit {
    font-size: 13px;
    font-weight: 400;
    margin-left: 2px;
  }
  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
    padding: 14px 24px;
  }
  .chart-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 16px;
  }
  .chart-card.full { grid-column: span 3; }
  .chart-card.span2 { grid-column: span 2; }
  .chart-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 12px;
    padding-left: 10px;
    border-left: 3px solid var(--accent);
  }
  .chart-box { width: 100%; height: 320px; }
  .chart-box.small { height: 280px; }
  .summary-section {
    padding: 0 24px 20px;
  }
  .summary-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--card-bg);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--card-border);
  }
  .summary-table th {
    background: #1e293b;
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 600;
    padding: 10px 14px;
    text-align: left;
    white-space: nowrap;
  }
  .summary-table td {
    padding: 9px 14px;
    font-size: 13px;
    border-top: 1px solid var(--card-border);
    color: var(--text);
  }
  .summary-table tr:hover td { background: rgba(59,130,246,0.05); }
  .tag {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
  }
  .tag-brand { background: rgba(59,130,246,0.15); color: #60a5fa; }
  .tag-cat { background: rgba(6,182,212,0.15); color: #22d3ee; }
  .tag-center { background: rgba(139,92,246,0.15); color: #a78bfa; }
  .tag-area { background: rgba(236,72,153,0.15); color: #f472b6; }
  .deal-rate-high { color: var(--red) !important; font-weight: 700; }

  @media (max-width: 1200px) {
    .kpi-row { grid-template-columns: repeat(3, 1fr); }
    .charts-grid { grid-template-columns: 1fr; }
    .chart-card.full, .chart-card.span2 { grid-column: span 1; }
  }
  @media (max-width: 768px) {
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
    .header h1 { font-size: 22px; }
  }
</style>
</head>

const kpiConfig = [
  { key: 'totalKz', label: '总客资', cls: 'blue', format: v => v.toLocaleString() },
  { key: 'validKz', label: '有效客资', cls: 'cyan', format: v => v.toLocaleString() },
  { key: 'assigned', label: '分配数', cls: 'green', format: v => v.toLocaleString() },
  { key: 'followed', label: '跟进数', cls: 'green', format: v => v.toLocaleString() },
  { key: 'orders', label: '成交数', cls: 'purple', format: v => v.toLocaleString() },
  { key: 'amountWan', label: '订单金额', cls: 'pink', format: v => v + '<span class="unit">万</span>' },
  { key: 'assignRate', label: '分配率', cls: 'amber', format: v => v + '<span class="unit">%</span>' },
  { key: 'followRate', label: '跟进率', cls: 'amber', format: v => v + '<span class="unit">%</span>' },
  { key: 'dealRate', label: '成交率', cls: v => v > 80 ? 'red' : 'amber', format: v => v + '<span class="unit">%</span>' },
];

const kpiRow = document.getElementById('kpiRow');
kpiConfig.forEach(item => {
  const val = DATA.kpi[item.key];
  const cls = typeof item.cls === 'function' ? item.cls(val) : item.cls;
  kpiRow.innerHTML += `
    <div class="kpi-card">
      <div class="label">${item.label}</div>
      <div class="value ${cls}">${item.format(val)}</div>
    </div>`;
});

const colors = ['#60a5fa','#34d399','#fbbf24','#a78bfa','#f472b6','#22d3ee','#fb923c','#4ade80'];

// ===== Funnel =====
(function() {
  const chart = initChart('funnelChart');
  const funnelData = DATA.funnel.map((d, i) => ({
    name: d.name,
    value: d.value,
    itemStyle: { color: colors[i] }
  }));
  chart.setOption({
    tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
    series: [{
      type: 'funnel',
      left: '10%', right: '10%', top: 10, bottom: 10,
      width: '80%',
      sort: 'descending',
      gap: 4,
      label: { show: true, position: 'inside', color: '#fff', fontSize: 13, fontWeight: 600 },
      labelLine: { show: false },
      itemStyle: { borderColor: 'var(--bg)', borderWidth: 2 },
      emphasis: { label: { fontSize: 15 } },
      data: funnelData
    }]
  });
  window.addEventListener('resize', () => chart.resize());
})();

      { name: '客资数', type: 'bar', data: d.map(x => x['客资数']), itemStyle: { color: '#60a5fa', borderRadius: [4,4,0,0] } },
      { name: '订单数', type: 'bar', data: d.map(x => x['订单数']), itemStyle: { color: '#a78bfa', borderRadius: [4,4,0,0] } },
      { name: '金额(万)', type: 'line', yAxisIndex: 1, data: d.map(x => x['订单金额_万']), itemStyle: { color: '#f472b6' }, lineStyle: { width: 2 }, symbol: 'circle', symbolSize: 6 }
    ]
  });
  window.addEventListener('resize', () => chart.resize());
})();

// ===== Center Chart (TOP15) =====
(function() {

    ]

// ===== Summary Table =====
(function() {
  const container = document.getElementById('summaryContainer');
  function buildSection(title, data, tagCls, nameCol) {
    const rows = data.sort((a, b) => b['订单金额'] - a['订单金额']).map(r => {
      const rate = r['客资数'] > 0 ? (r['订单数'] / r['客资数'] * 100).toFixed(1) : '0.0';
      const rateCls = parseFloat(rate) > 80 ? 'deal-rate-high' : '';
      return `<tr>
        <td>${r[nameCol]}</td>
        <td>${Number(r['客资数']).toLocaleString()}</td>
        <td>${Number(r['订单数']).toLocaleString()}</td>
        <td>${r['订单金额_万']}万</td>
        <td class="${rateCls}">${rate}%</td>
      </tr>`;
    }).join('');
    return `
      <table class="summary-table" style="margin-bottom:16px">
        <thead><tr>
          <th>${title}</th>
          <th>客资数</th><th>订单数</th><th>金额</th><th>成交率</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }
  container.innerHTML =
    buildSection('品牌', DATA.brands, 'tag-brand', '意向品牌') +
    buildSection('品类', DATA.categories, 'tag-cat', '品类') +
    buildSection('运营中心', DATA.centers, 'tag-center', '运营中心') +
    buildSection('片区', DATA.areas, 'tag-area', '片区');
})();
</script>
