<!DOCTYPE html>

<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>天猫新零售数据看板</title>

<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>

<style>

  :root {

    --bg: #050a18;

    --bg2: #0a1128;

    --card-bg: rgba(15, 23, 42, 0.7);

    --card-border: rgba(51, 65, 85, 0.4);

    --card-hover-border: rgba(99, 102, 241, 0.4);

    --text: #e2e8f0;

    --text-dim: #94a3b8;

    --accent: #6366f1;

    --accent2: #06b6d4;

    --green: #10b981;

    --amber: #f59e0b;

    --red: #ef4444;

    --purple: #8b5cf6;

    --pink: #ec4899;

    --glow-blue: rgba(99, 102, 241, 0.15);

    --glow-cyan: rgba(6, 182, 212, 0.1);

  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {

    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;

    background: linear-gradient(180deg, #050a18 0%, #0a1128 50%, #0f172a 100%);

    color: var(--text);

    min-height: 100vh;

    overflow-x: hidden;

  }

  body::before {

    content: '';

    position: fixed;

    top: -50%; left: -50%;

    width: 200%; height: 200%;

    background: radial-gradient(ellipse at 20% 20%, rgba(99,102,241,0.06) 0%, transparent 50%),

                radial-gradient(ellipse at 80% 80%, rgba(6,182,212,0.04) 0%, transparent 50%),

                radial-gradient(ellipse at 50% 50%, rgba(139,92,246,0.03) 0%, transparent 60%);

    pointer-events: none;

    z-index: 0;

    animation: bgShift 20s ease-in-out infinite alternate;

  }

  @keyframes bgShift {

    0% { transform: translate(0, 0); }

    100% { transform: translate(-3%, -3%); }

  }

  body > * { position: relative; z-index: 1; }



  /* Header */

  .header {

    text-align: center;

    padding: 28px 20px 18px;

    background: linear-gradient(135deg, rgba(15,23,42,0.9) 0%, rgba(30,27,75,0.6) 50%, rgba(15,23,42,0.9) 100%);

    border-bottom: 1px solid rgba(99,102,241,0.15);

    backdrop-filter: blur(20px);

    position: relative;

    overflow: hidden;

  }

  .header::after {

    content: '';

    position: absolute;

    bottom: 0; left: 50%;

    transform: translateX(-50%);

    width: 60%;

    height: 1px;

    background: linear-gradient(90deg, transparent, rgba(99,102,241,0.5), rgba(6,182,212,0.3), transparent);

  }

  .header h1 {

    font-size: 30px;

    font-weight: 800;

    background: linear-gradient(90deg, #818cf8, #a78bfa, #f472b6, #22d3ee);

    background-size: 200% auto;

    -webkit-background-clip: text;

    -webkit-text-fill-color: transparent;

    letter-spacing: 3px;

    animation: titleShimmer 4s linear infinite;

  }

  @keyframes titleShimmer {

    0% { background-position: 0% center; }

    100% { background-position: 200% center; }

  }

  .header .subtitle {

    color: var(--text-dim);

    font-size: 13px;

    margin-top: 6px;

    letter-spacing: 4px;

    font-weight: 300;

  }



  /* KPI Cards */

  .kpi-row {

    display: grid;

    grid-template-columns: repeat(9, 1fr);

    gap: 14px;

    padding: 24px 28px 12px;

  }

  .kpi-card {

    background: var(--card-bg);

    border: 1px solid var(--card-border);

    border-radius: 16px;

    padding: 18px 12px 14px;

    text-align: center;

    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

    backdrop-filter: blur(10px);

    position: relative;

    overflow: hidden;

  }

  .kpi-card::before {

    content: '';

    position: absolute;

    top: 0; left: 0; right: 0;

    height: 3px;

    border-radius: 16px 16px 0 0;

    background: linear-gradient(90deg, var(--kpi-color, #6366f1), transparent);

    opacity: 0.6;

    transition: opacity 0.3s;

  }

  .kpi-card:hover {

    transform: translateY(-4px);

    border-color: var(--card-hover-border);

    box-shadow: 0 12px 40px rgba(99,102,241,0.12), 0 0 0 1px rgba(99,102,241,0.08);

  }

  .kpi-card:hover::before { opacity: 1; }

  .kpi-card .label {

    font-size: 11px;

    color: var(--text-dim);

    margin-bottom: 10px;

    white-space: nowrap;

    text-transform: uppercase;

    letter-spacing: 1px;

    font-weight: 500;

  }

  .kpi-card .value {

    font-size: 26px;

    font-weight: 800;

    line-height: 1.2;

    font-variant-numeric: tabular-nums;

  }

  .kpi-card .value.blue { color: #818cf8; }

  .kpi-card .value.cyan { color: #22d3ee; }

  .kpi-card .value.green { color: #34d399; }

  .kpi-card .value.amber { color: #fbbf24; }

  .kpi-card .value.purple { color: #a78bfa; }

  .kpi-card .value.pink { color: #f472b6; }

  .kpi-card .value.red { color: #f87171; }

  .kpi-card .unit {

    font-size: 12px;

    font-weight: 400;

    margin-left: 1px;

    opacity: 0.7;

  }



  /* Charts Grid */

  .charts-grid {

    display: grid;

    grid-template-columns: 1fr 1fr 1fr;

    gap: 16px;

    padding: 16px 28px;

  }

  .chart-card {

    background: var(--card-bg);

    border: 1px solid var(--card-border);

    border-radius: 16px;

    padding: 20px;

    backdrop-filter: blur(10px);

    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

  }

  .chart-card:hover {

    border-color: var(--card-hover-border);

    box-shadow: 0 8px 32px rgba(99,102,241,0.08);

  }

  .chart-card.full { grid-column: span 3; }

  .chart-card.span2 { grid-column: span 2; }

  .chart-title {

    font-size: 14px;

    font-weight: 600;

    color: var(--text);

    margin-bottom: 14px;

    padding-left: 12px;

    border-left: 3px solid var(--accent);

    letter-spacing: 0.5px;

    display: flex;

    align-items: center;

    gap: 6px;

  }

  .chart-box { width: 100%; height: 320px; }

  .chart-box.small { height: 280px; }



  /* Charts Row for province maps */

  .charts-row {

    display: grid;

    grid-template-columns: 1fr 1fr 1fr;

    gap: 16px;

    padding: 0 28px 16px;

  }



  /* Summary Section */

  .summary-section {

    padding: 0 28px 28px;

  }

  .summary-table {

    width: 100%;

    border-collapse: separate;

    border-spacing: 0;

    background: var(--card-bg);

    border-radius: 16px;

    overflow: hidden;

    border: 1px solid var(--card-border);

    backdrop-filter: blur(10px);

  }

  .summary-table thead { background: rgba(30, 41, 59, 0.8); }

  .summary-table th {

    color: var(--text-dim);

    font-size: 12px;

    font-weight: 600;

    padding: 12px 16px;

    text-align: left;

    white-space: nowrap;

    text-transform: uppercase;

    letter-spacing: 0.5px;

    border-bottom: 1px solid rgba(99,102,241,0.1);

  }

  .summary-table td {

    padding: 11px 16px;

    font-size: 13px;

    border-top: 1px solid rgba(51,65,85,0.3);

    color: var(--text);

    transition: background 0.2s;

  }

  .summary-table tbody tr:nth-child(even) td { background: rgba(15,23,42,0.3); }

  .summary-table tbody tr:hover td { background: rgba(99,102,241,0.06); }

  .tag {

    display: inline-block;

    padding: 3px 12px;

    border-radius: 20px;

    font-size: 11px;

    font-weight: 600;

    letter-spacing: 0.3px;

  }

  .tag-brand { background: rgba(99,102,241,0.12); color: #818cf8; border: 1px solid rgba(99,102,241,0.2); }

  .tag-cat { background: rgba(6,182,212,0.12); color: #22d3ee; border: 1px solid rgba(6,182,212,0.2); }

  .tag-center { background: rgba(139,92,246,0.12); color: #a78bfa; border: 1px solid rgba(139,92,246,0.2); }

  .tag-area { background: rgba(236,72,153,0.12); color: #f472b6; border: 1px solid rgba(236,72,153,0.2); }

  .deal-rate-high { color: var(--red) !important; font-weight: 700; }



  /* Filter bar */

  .filter-bar {

    display: flex;

    align-items: center;

    gap: 14px;

    padding: 16px 28px;

    background: rgba(15, 23, 42, 0.6);

    border-bottom: 1px solid rgba(99,102,241,0.1);

    backdrop-filter: blur(10px);

    flex-wrap: wrap;

  }

  .filter-bar label {

    font-size: 12px;

    color: var(--text-dim);

    font-weight: 600;

    letter-spacing: 0.5px;

  }

  .filter-bar select,

  .filter-bar input[type="date"] {

    background: rgba(15, 23, 42, 0.8);

    color: var(--text);

    border: 1px solid var(--card-border);

    border-radius: 10px;

    padding: 7px 14px;

    font-size: 13px;

    outline: none;

    font-family: inherit;

    transition: all 0.2s;

  }

  .filter-bar select:focus,

  .filter-bar input[type="date"]:focus {

    border-color: var(--accent);

    box-shadow: 0 0 0 3px rgba(99,102,241,0.12);

  }

  .filter-bar select { min-width: 140px; }

  .filter-bar .date-group {

    display: flex;

    align-items: center;

    gap: 6px;

  }

  .filter-bar .btn-reset {

    background: rgba(239,68,68,0.1);

    color: #f87171;

    border: 1px solid rgba(239,68,68,0.2);

    border-radius: 10px;

    padding: 7px 18px;

    font-size: 13px;

    cursor: pointer;

    font-family: inherit;

    font-weight: 600;

    transition: all 0.2s;

  }

  .filter-bar .btn-reset:hover {

    background: rgba(239,68,68,0.2);

    box-shadow: 0 0 0 3px rgba(239,68,68,0.1);

  }



  /* Scrollbar */

  ::-webkit-scrollbar { width: 6px; height: 6px; }

  ::-webkit-scrollbar-track { background: transparent; }

  ::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.3); border-radius: 3px; }

  ::-webkit-scrollbar-thumb:hover { background: rgba(99,102,241,0.5); }



  /* Selection */

  ::selection { background: rgba(99,102,241,0.3); color: #fff; }



  @media (max-width: 1200px) {

    .kpi-row { grid-template-columns: repeat(3, 1fr); }

    .charts-grid { grid-template-columns: 1fr; }

    .charts-row { grid-template-columns: 1fr; }

    .chart-card.full, .chart-card.span2 { grid-column: span 1; }

  }

  @media (max-width: 768px) {

    .kpi-row { grid-template-columns: repeat(2, 1fr); }

    .header h1 { font-size: 22px; }

    .kpi-row, .charts-grid, .charts-row, .summary-section { padding-left: 16px; padding-right: 16px; }

    .filter-bar { padding-left: 16px; padding-right: 16px; }

  }

</style>

</head>

<body>



<div class="header">

  <h1>📊 天猫新零售数据看板</h1>

  <div class="subtitle">数据驱动决策 · 实时业务洞察</div>

</div>



<div class="filter-bar" id="filterBar">

  <label>📅 日期</label>

  <div class="date-group">

    <input type="date" id="filterDateStart">

    <span style="color:#64748b">~</span>

    <input type="date" id="filterDateEnd">

  </div>

  <label>🏷️ 品牌</label>

  <select id="filterBrand"><option value="">全部</option></select>

  <label>📦 品类</label>

  <select id="filterCategory"><option value="">全部</option></select>

  <label>🏢 运中</label>

  <select id="filterCenter"><option value="">全部</option></select>

  <button class="btn-reset" onclick="resetFilters()">重置</button>

</div>



<div class="kpi-row" id="kpiRow"></div>



<div class="charts-grid">

  <div class="chart-card full">

    <div class="chart-title">📊 每日趋势（客资数 vs 订单数）</div>

    <div class="chart-box" id="dailyTrendChart" style="height:320px"></div>

  </div>

  <div class="chart-card span2">

    <div class="chart-title">📈 日度四率走势（有效客资率/分配率/跟进率/成交率）</div>

    <div class="chart-box" id="trendChart"></div>

  </div>

  <div class="chart-card">

    <div class="chart-title">🔻 转化漏斗</div>

    <div class="chart-box" id="funnelChart"></div>

  </div>

  <div class="chart-card full">

    <div class="chart-title">💰 月度品类金额（万元）</div>

    <div class="chart-box" id="monthlyCatChart" style="height:320px"></div>

  </div>

  <div class="chart-card">

    <div class="chart-title">🏷️ 品牌分析</div>

    <div class="chart-box small" id="brandChart"></div>

  </div>

  <div class="chart-card">

    <div class="chart-title">📦 品类分析</div>

    <div class="chart-box small" id="categoryChart"></div>

  </div>

  <div class="chart-card">

    <div class="chart-title">🏢 运营中心TOP15</div>

    <div class="chart-box small" id="centerChart"></div>

  </div>

</div>



<div class="charts-row" style="margin-top:16px">

  <div class="chart-card">

    <div class="chart-title">🗺️ 客资省份分布</div>

    <div class="chart-box small" id="kzProvinceChart" style="height:420px"></div>

  </div>

  <div class="chart-card">

    <div class="chart-title">🗺️ 订单省份金额（万元）</div>

    <div class="chart-box small" id="orderProvinceChart" style="height:420px"></div>

  </div>

  <div class="chart-card">

    <div class="chart-title">📍 运营中心订单分布（气泡图）</div>

    <div class="chart-box small" id="centerProvinceChart" style="height:420px"></div>

  </div>

</div>



<div class="summary-section">

  <div class="chart-card" style="margin-bottom:20px">

    <div class="chart-title">📋 汇总明细</div>

    <div style="overflow-x:auto;max-height:500px;overflow-y:auto" id="summaryContainer"></div>

  </div>

</div>



<script>

// ===== Load Data =====

let DATA, filteredKPI, filteredDetail, filteredOrders, filteredDaily;

let filteredBrands, filteredCategories, filteredCenters, filteredAreas;

let chartDailyTrend, chartRateTrend, chartFunnel, chartBrand, chartCategory, chartCenter, chartMonthlyCat;

let chartKzProvince, chartOrderProvince, chartCenterProvince;



fetch('dashboard_data.json?t=' + Date.now())

  .then(r => r.json())

  .then(data => {

    DATA = data;

    initFilters();

    applyFilters();

  });



// ===== Filter Logic =====

function initFilters() {

  const opts = DATA.filterOptions;

  document.getElementById('filterDateStart').value = opts.dateMin;

  document.getElementById('filterDateEnd').value = opts.dateMax;

  const bSel = document.getElementById('filterBrand');

  opts.brands.forEach(b => { const o = document.createElement('option'); o.value = b; o.textContent = b; bSel.appendChild(o); });

  const cSel = document.getElementById('filterCategory');

  opts.categories.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; cSel.appendChild(o); });

  const oSel = document.getElementById('filterCenter');

  opts.centers.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; oSel.appendChild(o); });

}



function resetFilters() {

  const opts = DATA.filterOptions;

  document.getElementById('filterDateStart').value = opts.dateMin;

  document.getElementById('filterDateEnd').value = opts.dateMax;

  document.getElementById('filterBrand').value = '';

  document.getElementById('filterCategory').value = '';

  document.getElementById('filterCenter').value = '';

  applyFilters();

}



function applyFilters() {

  const ds = document.getElementById('filterDateStart').value;

  const de = document.getElementById('filterDateEnd').value;

  const brand = document.getElementById('filterBrand').value;

  const cat = document.getElementById('filterCategory').value;

  const center = document.getElementById('filterCenter').value;



  // Filter aggregated detail

  const fDetail = DATA.aggDetail.filter(r => {

    if (ds && r['日期'] < ds) return false;

    if (de && r['日期'] > de) return false;

    if (brand && r['意向品牌'] !== brand) return false;

    if (cat && r['品类'] !== cat) return false;

    if (center && r['运营中心'] !== center) return false;

    return true;

  });



  // Filter aggregated orders

  const fOrders = DATA.aggOrders.filter(r => {

    if (ds && r['日期'] < ds) return false;

    if (de && r['日期'] > de) return false;

    if (brand && r['品牌'] !== brand) return false;

    if (cat && r['品类'] !== cat) return false;

    if (center && r['运中'] !== center) return false;

    return true;

  });



  // KPI sums

  let totalKz=0, validKz=0, assigned=0, followed=0, orders=0, amount=0;

  fDetail.forEach(r => { totalKz += r['总客资']; validKz += r['有效客资']; assigned += r['分配数']; followed += r['跟进数']; });

  fOrders.forEach(r => { orders += r['订单数']; amount += r['订单金额']; });

  filteredKPI = {

    totalKz, validKz, assigned, followed, orders,

    amountWan: Math.round(amount / 10000 * 10) / 10,

    assignRate: validKz ? Math.round(assigned / validKz * 1000) / 10 : 0,

    followRate: assigned ? Math.round(followed / assigned * 1000) / 10 : 0,

    dealRate: validKz ? Math.round(orders / validKz * 1000) / 10 : 0

  };



  // Daily trend from filtered detail

  const dateMap = {};

  fDetail.forEach(r => {

    const d = r['日期']; if (!dateMap[d]) dateMap[d] = { 客资数:0, 有效客资:0, 分配数:0, 跟进数:0, 成交数:0 };

    dateMap[d].客资数 += r['总客资'];

    dateMap[d].有效客资 += r['有效客资'];

    dateMap[d].分配数 += r['分配数'];

    dateMap[d].跟进数 += r['跟进数'];

  });

  fOrders.forEach(r => {

    const d = r['日期']; if (!dateMap[d]) dateMap[d] = { 客资数:0, 有效客资:0, 分配数:0, 跟进数:0, 成交数:0 };

    dateMap[d].成交数 += r['订单数'];

  });

  filteredDaily = Object.keys(dateMap).sort().map(d => {

    const v = dateMap[d];

    return { 日期_str: d, 客资数: v.客资数, 有效客资: v.有效客资, 分配数: v.分配数, 跟进数: v.跟进数, 成交数: v.成交数,

      有效客资率: v.客资数 ? Math.round(v.有效客资/v.客资数*1000)/10 : 0,

      分配率: v.有效客资 ? Math.round(v.分配数/v.有效客资*1000)/10 : 0,

      跟进率: v.分配数 ? Math.round(v.跟进数/v.分配数*1000)/10 : 0,

      成交率: v.有效客资 ? Math.round(v.成交数/v.有效客资*1000)/10 : 0 };

  });



  // Breakdowns

  function calcBreakdown(detailKey, orderKey) {

    const dMap={}, oMap={};

    fDetail.forEach(r => { const k=r[detailKey]; if(!k) return; dMap[k]=(dMap[k]||{客资数:0}); dMap[k].客资数+=r['总客资']; });

    fOrders.forEach(r => { const k=r[orderKey]; if(!k) return; oMap[k]=oMap[k]||{订单数:0,订单金额:0}; oMap[k].订单数+=r['订单数']; oMap[k].订单金额+=r['订单金额']; });

    const keys = new Set([...Object.keys(dMap),...Object.keys(oMap)]);

    return [...keys].map(k => ({ [detailKey]:k, 客资数:(dMap[k]||{}).客资数||0, 订单数:(oMap[k]||{}).订单数||0, 订单金额:(oMap[k]||{}).订单金额||0, 订单金额_万:Math.round(((oMap[k]||{}).订单金额||0)/10000*10)/10 }));

  }

  filteredBrands = calcBreakdown('意向品牌','品牌');

  filteredCategories = calcBreakdown('品类','品类');

  filteredCenters = calcBreakdown('运营中心','运中');



  // Areas

  const centerAreaMap = {};

  DATA.aggDetail.forEach(r => { if(r['运营中心']) centerAreaMap[r['运营中心']] = ''; });

  // Use static area mapping from pre-built data

  const areaMap2 = {};

  DATA.areas.forEach(r => { areaMap2[r['片区']] = true; });

  // Simpler: just use centers as areas proxy

  filteredAreas = filteredCenters.map(r => ({ 片区: r['运营中心'], ...r }));



  renderKPI(); renderDailyTrend(); renderRateTrend(); renderFunnel();

  renderBrandChart(); renderCategoryChart(); renderCenterChart(); renderMonthlyCatChart(); renderProvinceCharts(); renderSummary();

}



// Bind filter events

['filterDateStart','filterDateEnd','filterBrand','filterCategory','filterCenter'].forEach(id => {

  document.getElementById(id).addEventListener('change', applyFilters);

});



// ===== KPI Cards =====

const kpiConfig = [

  { key: 'totalKz', label: '总客资', cls: 'blue', color: '#818cf8', format: v => v.toLocaleString() },

  { key: 'validKz', label: '有效客资', cls: 'cyan', color: '#22d3ee', format: v => v.toLocaleString() },

  { key: 'assigned', label: '分配数', cls: 'green', color: '#34d399', format: v => v.toLocaleString() },

  { key: 'followed', label: '跟进数', cls: 'green', color: '#34d399', format: v => v.toLocaleString() },

  { key: 'orders', label: '成交数', cls: 'purple', color: '#a78bfa', format: v => v.toLocaleString() },

  { key: 'amountWan', label: '订单金额', cls: 'pink', color: '#f472b6', format: v => v + '<span class="unit">万</span>' },

  { key: 'assignRate', label: '分配率', cls: 'amber', color: '#fbbf24', format: v => v + '<span class="unit">%</span>' },

  { key: 'followRate', label: '跟进率', cls: 'amber', color: '#fbbf24', format: v => v + '<span class="unit">%</span>' },

  { key: 'dealRate', label: '成交率', cls: v => v > 80 ? 'red' : 'amber', color: v => v > 80 ? '#f87171' : '#fbbf24', format: v => v + '<span class="unit">%</span>' },

function loadChinaMap(cb) {
  if (echarts.getMap('china')) return cb();
  var urls = [
    'https://fastly.jsdelivr.net/npm/echarts@5.4.3/map/json/china.json',
    'https://cdn.jsdelivr.net/npm/echarts@5.4.3/map/json/china.json'
  ];
  function tryLoad(idx) {
    if (idx >= urls.length) { console.error('China map GeoJSON load failed'); return; }
    fetch(urls[idx])
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function(geo) {
        echarts.registerMap('china', geo);
        console.log('China map loaded from: ' + urls[idx]);
        cb();
      })
      .catch(function() { tryLoad(idx + 1); });
  }
  tryLoad(0);
}

          borderWidth: 2,

          shadowBlur: 35,

          shadowColor: 'rgba(14,165,233,0.8)'

        },

        label: {

          show: true,

          formatter: function(p) {

            var amount = p.data['订单金额_万'] || 0;

            return p.name + '\n' + amount + '万';

          },

          position: 'right',

          distance: 8,

          color: '#e2e8f0',

          fontSize: 11,

          fontWeight: 'bold',

          lineHeight: 16,

          textShadowColor: 'rgba(0,0,0,0.9)',

          textShadowBlur: 8,

          rich: {}

        },

        emphasis: {

          label: {

            color: '#f0f9ff',

            fontSize: 13,

            fontWeight: 'bold'

          },

          itemStyle: {

            borderColor: 'rgba(251,191,36,0.9)',

            borderWidth: 3,

            color: new echarts.graphic.RadialGradient(0.4, 0.3, 1, [

              { offset: 0, color: 'rgba(251,191,36,0.95)' },

              { offset: 0.4, color: 'rgba(245,158,11,0.7)' },

              { offset: 1, color: 'rgba(217,119,6,0.15)' }

            ]),

            shadowBlur: 35,

            shadowColor: 'rgba(251,191,36,0.6)'

          },

          rippleEffect: {

            brushType: 'fill',

            scale: 6

          }

        },

        zlevel: 1

      }]

    });

  });

}



// ===== Summary Table =====

function renderSummary() {

  const container = document.getElementById('summaryContainer');

  function buildSection(title, data, tagCls, nameCol) {

    const rows = data.sort((a, b) => b['订单金额'] - a['订单金额']).map(r => {

      const rate = r['客资数'] > 0 ? (r['订单数'] / r['客资数'] * 100).toFixed(1) : '0.0';

      const rateCls = parseFloat(rate) > 80 ? 'deal-rate-high' : '';

      return `<tr>

        <td>${r[nameCol]}</td>

        <td>${Number(r['客资数']).toLocaleString()}</td>

        <td>${Number(r['订单数']).toLocaleString()}</td>

        <td>${r['订单金额_万']}万</td>

        <td class="${rateCls}">${rate}%</td>

      </tr>`;

    }).join('');

    return `

      <table class="summary-table" style="margin-bottom:16px">

        <thead><tr>

          <th>${title}</th>

          <th>客资数</th><th>订单数</th><th>金额</th><th>成交率</th>

        </tr></thead>

        <tbody>${rows}</tbody>

      </table>`;

  }

  container.innerHTML =

    buildSection('品牌', filteredBrands, 'tag-brand', '意向品牌') +

    buildSection('品类', filteredCategories, 'tag-cat', '品类') +

    buildSection('运营中心', filteredCenters, 'tag-center', '运营中心') +

    buildSection('片区', filteredAreas, 'tag-area', '片区');

}



// ===== Resize handler =====

window.addEventListener('resize', () => {

  [chartDailyTrend, chartRateTrend, chartFunnel, chartBrand, chartCategory, chartCenter, chartMonthlyCat, chartKzProvince, chartOrderProvince, chartCenterProvince].forEach(c => c && c.resize());

});
